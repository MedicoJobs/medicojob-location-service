name: location-service CI Pipeline

on:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review
    branches:
      - main
      - master
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: read

jobs:
  pipeline:
    if: ${{ github.event_name == 'workflow_dispatch' || (github.event_name == 'pull_request' && github.event.action != 'closed') }}
    uses: ./.github/workflows/ci_service_pipeline.yml
    with:
      service_name: location-service
      service_path: .
      sonar_project_key: medicojob-location-service
      sonar_token_secret_name: SONAR_TOKEN
    secrets: inherit
